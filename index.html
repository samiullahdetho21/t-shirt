<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreadForge | Monochrome T‑Shirts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body class="bg-gray-50 dark:bg-black text-gray-900 dark:text-gray-100">
  <!-- Header (shared) -->
  <header class="sticky top-0 z-50 bg-white/90 dark:bg-black/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <i class="fas fa-tshirt text-3xl text-gray-800 dark:text-gray-200"></i>
        <span class="text-2xl font-black tracking-tight text-gray-900 dark:text-white">THREADFORGE</span>
      </a>
      <div class="flex items-center gap-5">
        <button id="themeToggle" class="text-xl p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
          <i class="fas fa-sun dark:fa-moon"></i>
        </button>
        <a href="shop.html" class="hidden md:block hover:text-gray-600 dark:hover:text-gray-300 transition">Shop</a>
        <a href="cart.html" class="relative text-xl">
          <i class="fas fa-shopping-cart"></i>
          <span id="cartCount" class="absolute -top-2 -right-3 bg-black dark:bg-white text-white dark:text-black text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </a>
        <div class="relative group">
          <button class="flex items-center gap-1"><i class="fas fa-user"></i> <span id="userName">Account</span></button>
          <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-900 rounded-md shadow-lg hidden group-hover:block z-20 border border-gray-200 dark:border-gray-800">
            <a href="login.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800">Login</a>
            <a href="#" id="logoutBtn" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Hero Video Section (grayscale) -->
  <section class="relative h-screen flex items-center justify-center overflow-hidden">
    <video autoplay muted loop playsinline class="absolute top-0 left-0 w-full h-full object-cover grayscale">
      <source src="https://videos.pexels.com/video-files/4977365/4977365-uhd_2560_1440_30fps.mp4" type="video/mp4">
    </video>
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative z-10 text-center text-white px-4 max-w-4xl mx-auto">
      <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter drop-shadow-2xl">Define Your <span class="border-b-2 border-white">Silhouette</span></h1>
      <p class="text-xl md:text-2xl mt-4 font-light">Engineered comfort · Cinematic drapes · Iconic streetwear</p>
      <div class="mt-8 flex gap-4 justify-center">
        <a href="shop.html" class="bg-white text-black px-8 py-3 rounded-full font-bold shadow-xl hover:scale-105 transition">SHOP NOW</a>
        <a href="#" class="border border-white/60 px-8 py-3 rounded-full font-medium hover:bg-white/10 transition">WATCH FILM</a>
      </div>
    </div>
  </section>

  <!-- Featured Categories (monochrome) -->
  <section class="py-20 px-4 max-w-7xl mx-auto">
    <h2 class="text-4xl font-black text-center mb-12">Shop by <span class="border-b-2 border-gray-500">Category</span></h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
      <a href="shop.html?category=ACTIVEWEAR" class="group relative overflow-hidden rounded-2xl h-64">
        <img src="https://images.pexels.com/photos/1648750/pexels-photo-1648750.jpeg?auto=compress&cs=tinysrgb&w=400&h=500&fit=crop" class="w-full h-full object-cover group-hover:scale-110 transition duration-700 grayscale">
        <div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition"></div>
        <span class="absolute bottom-4 left-4 text-white text-2xl font-bold">ACTIVEWEAR</span>
      </a>
      <a href="shop.html?category=BASICS" class="group relative overflow-hidden rounded-2xl h-64">
        <img src="https://images.pexels.com/photos/1082529/pexels-photo-1082529.jpeg?auto=compress&cs=tinysrgb&w=400&h=500&fit=crop" class="w-full h-full object-cover group-hover:scale-110 transition duration-700 grayscale">
        <div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition"></div>
        <span class="absolute bottom-4 left-4 text-white text-2xl font-bold">BASICS</span>
      </a>
      <a href="shop.html?category=GRAPHICS" class="group relative overflow-hidden rounded-2xl h-64">
        <img src="https://images.pexels.com/photos/5698420/pexels-photo-5698420.jpeg?auto=compress&cs=tinysrgb&w=400&h=500&fit=crop" class="w-full h-full object-cover group-hover:scale-110 transition duration-700 grayscale">
        <div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition"></div>
        <span class="absolute bottom-4 left-4 text-white text-2xl font-bold">GRAPHICS</span>
      </a>
      <a href="shop.html?category=PRINTED" class="group relative overflow-hidden rounded-2xl h-64">
        <img src="https://images.pexels.com/photos/2895198/pexels-photo-2895198.jpeg?auto=compress&cs=tinysrgb&w=400&h=500&fit=crop" class="w-full h-full object-cover group-hover:scale-110 transition duration-700 grayscale">
        <div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition"></div>
        <span class="absolute bottom-4 left-4 text-white text-2xl font-bold">PRINTED</span>
      </a>
    </div>
  </section>

  <!-- Featured Products -->
  <section class="py-20 px-4 bg-gray-100 dark:bg-gray-900">
    <div class="max-w-7xl mx-auto">
      <h2 class="text-4xl font-black text-center mb-12">Featured <span class="border-b-2 border-gray-500">Drops</span></h2>
      <div id="featuredProducts" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>
  </section>

  <footer class="py-12 border-t border-gray-200 dark:border-gray-800 text-center text-gray-500 text-sm">
    <p>© 2025 THREADFORGE — Monochrome Atelier. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
  <script>
    // Load featured products
    const featured = products.filter(p => p.featured).slice(0,4);
    renderProductCards("featuredProducts", featured, true);
    // GSAP animations
    gsap.from(".hero-video", { opacity: 0, duration: 1.5 });
    gsap.from("header", { y: -50, opacity: 0, duration: 0.8 });
    gsap.from(".hero-video + div h1", { y: 70, opacity: 0, duration: 1, delay: 0.4 });
  </script>
</body>
          </html>
