<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreadForge | Cinematic T‑Shirt Store</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body class="bg-gray-50 dark:bg-black text-gray-900 dark:text-gray-100 transition-colors">
  <!-- Header (shared) -->
  <header class="sticky top-0 z-50 bg-white/90 dark:bg-black/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fas fa-tshirt text-3xl text-amber-600 dark:text-amber-500"></i>
        <span class="text-2xl font-black tracking-tight bg-gradient-to-r from-amber-700 to-amber-500 bg-clip-text text-transparent">THREADFORGE</span>
      </div>
      <div class="flex items-center gap-5">
        <button id="themeToggle" class="text-xl p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
          <i class="fas fa-sun dark:fa-moon"></i>
        </button>
        <a href="admin.html" class="hidden md:flex items-center gap-2 bg-amber-100 dark:bg-amber-900/40 px-4 py-2 rounded-full text-sm font-semibold text-amber-800 dark:text-amber-300">
          <i class="fas fa-chart-line"></i> Admin Panel
        </a>
        <button id="cartIconBtn" class="relative text-xl">
          <i class="fas fa-shopping-cart"></i>
          <span id="cartCount" class="absolute -top-2 -right-3 bg-amber-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="relative h-[85vh] flex items-center justify-center overflow-hidden">
    <video autoplay muted loop playsinline class="absolute top-0 left-0 w-full h-full object-cover z-[-2]">
      <source src="https://videos.pexels.com/video-files/4977365/4977365-uhd_2560_1440_30fps.mp4" type="video/mp4">
    </video>
    <div class="absolute inset-0 bg-gradient-to-b from-black/40 to-black/70 z-[-1]"></div>
    <div class="relative z-10 text-center text-white px-4">
      <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter drop-shadow-2xl">Define Your <span class="text-amber-400">Silhouette</span></h1>
      <p class="text-xl md:text-2xl mt-4 font-light max-w-2xl mx-auto">Engineered comfort · Cinematic drapes · Iconic streetwear</p>
      <div class="mt-8 flex gap-4 justify-center">
        <button class="bg-gradient-to-r from-amber-500 to-amber-700 px-8 py-3 rounded-full font-bold text-black shadow-xl">EXPLORE COLLECTION</button>
        <button class="border border-white/60 px-8 py-3 rounded-full font-medium hover:bg-white/10 transition">WATCH FILM</button>
      </div>
    </div>
  </section>

  <!-- Filters -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 mt-8">
    <div class="flex flex-wrap items-center justify-between gap-4 border-b border-gray-200 dark:border-gray-800 pb-4">
      <div class="flex flex-wrap gap-3" id="categoryFilterList"></div>
      <div class="flex gap-3">
        <select id="sortSelect" class="bg-gray-100 dark:bg-gray-800 rounded-full px-4 py-2 text-sm">
          <option value="featured">Featured</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search t-shirts..." class="pl-9 pr-4 py-2 rounded-full bg-gray-100 dark:bg-gray-800 text-sm">
      </div>
    </div>
  </div>

  <!-- Products Grid -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
  </div>

  <!-- Recommendations -->
  <section class="bg-gradient-to-r from-gray-100 to-gray-50 dark:from-gray-900 dark:to-black py-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-3 mb-8">
        <i class="fas fa-crown text-amber-500 text-3xl"></i>
        <h2 class="text-3xl md:text-4xl font-black">RECOMMENDED FOR YOU</h2>
      </div>
      <div id="recommendationGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>
  </section>

  <!-- Cart Drawer -->
  <div id="cartDrawer" class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white dark:bg-black border-l border-gray-300 dark:border-gray-800 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-5 border-b flex justify-between items-center">
      <h2 class="text-xl font-bold"><i class="fas fa-shopping-bag"></i> Cart</h2>
      <button id="closeCartBtn"><i class="fas fa-times text-2xl"></i></button>
    </div>
    <div id="cartItemsList" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
    <div class="p-4 border-t">
      <div class="flex justify-between font-bold text-lg"><span>Total</span><span id="cartTotalAmount">$0</span></div>
      <button class="bg-gradient-to-r from-amber-500 to-amber-700 w-full mt-4 py-2 rounded-full text-black font-bold">CHECKOUT</button>
    </div>
  </div>
  <div id="cartOverlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

  <footer class="py-12 border-t border-gray-200 dark:border-gray-800 text-center text-gray-500 text-sm">
    <p>© THREADFORGE — Cinematic Atelier</p>
  </footer>

  <script src="script.js"></script>
</body>
  </html>
