<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ThreadForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-black">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-8">
      <div class="text-center mb-8">
        <i class="fas fa-tshirt text-5xl text-amber-500"></i>
        <h2 class="text-3xl font-black mt-2">THREADFORGE</h2>
        <p class="text-gray-500">Sign in to your account</p>
      </div>
      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" class="w-full mb-4 p-3 border rounded-lg bg-gray-50 dark:bg-gray-800" required>
        <input type="password" id="loginPassword" placeholder="Password" class="w-full mb-4 p-3 border rounded-lg bg-gray-50 dark:bg-gray-800" required>
        <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-full transition">Login</button>
      </form>
      <p class="text-center mt-4">Don't have an account? <a href="register.html" class="text-amber-500">Register</a></p>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      if (login(email, password)) {
        alert("Login successful!");
        window.location.href = "index.html";
      } else {
        alert("Invalid credentials. Try admin@threadforge.com / admin123");
      }
    });
  </script>
</body>
</html>
