<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | ThreadForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-black text-gray-900 dark:text-gray-100">
  <!-- Same header (copy from above) -->
  <header class="sticky top-0 z-50 bg-white/90 dark:bg-black/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <i class="fas fa-tshirt text-3xl text-gray-800 dark:text-gray-200"></i>
        <span class="text-2xl font-black tracking-tight text-gray-900 dark:text-white">THREADFORGE</span>
      </a>
      <div class="flex items-center gap-5">
        <button id="themeToggle" class="text-xl p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
          <i class="fas fa-sun dark:fa-moon"></i>
        </button>
        <a href="shop.html" class="hidden md:block hover:text-gray-600 dark:hover:text-gray-300 transition">Shop</a>
        <a href="cart.html" class="relative text-xl">
          <i class="fas fa-shopping-cart"></i>
          <span id="cartCount" class="absolute -top-2 -right-3 bg-black dark:bg-white text-white dark:text-black text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </a>
        <div class="relative group">
          <button class="flex items-center gap-1"><i class="fas fa-user"></i> <span id="userName">Account</span></button>
          <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-900 rounded-md shadow-lg hidden group-hover:block z-20 border border-gray-200 dark:border-gray-800">
            <a href="login.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800">Login</a>
            <a href="#" id="logoutBtn" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div id="productDetail" class="grid md:grid-cols-2 gap-12">
      <!-- loaded by JS -->
    </div>
    <!-- Recommendations -->
    <div class="mt-20">
      <h2 class="text-3xl font-black mb-8">You May Also Like</h2>
      <div id="recommendations" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>
  </main>

  <footer class="py-12 border-t border-gray-200 dark:border-gray-800 text-center text-gray-500 text-sm">
    <p>© 2025 THREADFORGE — Monochrome Atelier</p>
  </footer>

  <script src="script.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get("id"));
    const product = products.find(p => p.id === productId);
    if (!product) {
      document.getElementById("productDetail").innerHTML = "<p class='text-center text-red-500'>Product not found.</p>";
    } else {
      const price = getFinalPrice(product);
      const original = product.salePrice ? product.price : null;
      document.getElementById("productDetail").innerHTML = `
        <div class="rounded-2xl overflow-hidden shadow-xl">
          <img src="${product.image}" class="w-full object-cover h-96 md:h-auto grayscale">
        </div>
        <div>
          <h1 class="text-4xl font-black">${product.name}</h1>
          <p class="text-gray-500 text-sm uppercase mt-2">${product.category}</p>
          <div class="mt-4 flex items-center gap-3">
            <span class="text-3xl font-bold">Rs. ${price.toLocaleString()}</span>
            ${original ? `<span class="line-through text-gray-400">Rs. ${original.toLocaleString()}</span>` : ""}
          </div>
          <p class="mt-4 text-gray-600 dark:text-gray-400">${product.description || "Premium quality t-shirt with exceptional fit and feel."}</p>
          <div class="mt-6">
            <label class="block text-sm font-medium">Size</label>
            <div class="flex gap-3 mt-2">
              <button class="size-btn px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-full hover:border-black dark:hover:border-white" data-size="S">S</button>
              <button class="size-btn px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-full hover:border-black dark:hover:border-white" data-size="M">M</button>
              <button class="size-btn px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-full hover:border-black dark:hover:border-white" data-size="L">L</button>
              <button class="size-btn px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-full hover:border-black dark:hover:border-white" data-size="XL">XL</button>
            </div>
          </div>
          <div class="mt-6">
            <label class="block text-sm font-medium">Quantity</label>
            <input type="number" id="quantity" value="1" min="1" class="mt-2 w-24 px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800">
          </div>
          <button id="addToCartDetail" class="mt-8 w-full bg-black hover:bg-gray-800 text-white font-bold py-3 rounded-full transition">ADD TO CART</button>
        </div>
      `;
      // Size selection
      let selectedSize = "M";
      document.querySelectorAll(".size-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("bg-black", "text-white", "dark:bg-white", "dark:text-black"));
          btn.classList.add("bg-black", "text-white", "dark:bg-white", "dark:text-black");
          selectedSize = btn.dataset.size;
        });
      });
      document.getElementById("addToCartDetail").addEventListener("click", () => {
        const qty = parseInt(document.getElementById("quantity").value);
        addToCart(product.id, qty, selectedSize);
        alert(`Added ${qty} x ${product.name} (${selectedSize}) to cart!`);
      });
      // Recommendations (based on same category)
      const sameCat = products.filter(p => p.category === product.category && p.id !== product.id).slice(0,4);
      renderProductCards("recommendations", sameCat, true);
    }
  </script>
</body>
</html>
