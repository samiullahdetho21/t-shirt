<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | ThreadForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-black">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-8 border border-gray-200 dark:border-gray-800">
      <div class="text-center mb-8">
        <i class="fas fa-tshirt text-5xl text-gray-800 dark:text-gray-200"></i>
        <h2 class="text-3xl font-black mt-2">THREADFORGE</h2>
        <p class="text-gray-500">Create a new account</p>
      </div>
      <form id="registerForm">
        <input type="email" id="regEmail" placeholder="Email" class="w-full mb-4 p-3 border border-gray-300 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800" required>
        <input type="password" id="regPassword" placeholder="Password" class="w-full mb-4 p-3 border border-gray-300 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800" required>
        <input type="password" id="regConfirm" placeholder="Confirm Password" class="w-full mb-4 p-3 border border-gray-300 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800" required>
        <button type="submit" class="w-full bg-black hover:bg-gray-800 text-white font-bold py-3 rounded-full transition">Register</button>
      </form>
      <p class="text-center mt-4">Already have an account? <a href="login.html" class="text-black dark:text-white underline">Login</a></p>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("regEmail").value;
      const password = document.getElementById("regPassword").value;
      const confirm = document.getElementById("regConfirm").value;
      if (password !== confirm) {
        alert("Passwords do not match!");
        return;
      }
      if (register(email, password)) {
        alert("Registration successful! Please login.");
        window.location.href = "login.html";
      } else {
        alert("Email already exists!");
      }
    });
  </script>
</body>
</html>
