<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | ThreadForge</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50 dark:bg-black text-gray-900 dark:text-gray-100">
  <header class="sticky top-0 z-50 bg-white/90 dark:bg-black/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fas fa-tshirt text-3xl text-amber-600 dark:text-amber-500"></i>
        <span class="text-2xl font-black tracking-tight bg-gradient-to-r from-amber-700 to-amber-500 bg-clip-text text-transparent">THREADFORGE</span>
      </div>
      <div class="flex items-center gap-5">
        <button id="themeToggle" class="text-xl p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
          <i class="fas fa-sun dark:fa-moon"></i>
        </button>
        <a href="index.html" class="bg-amber-100 dark:bg-amber-900/40 px-4 py-2 rounded-full text-sm font-semibold text-amber-800 dark:text-amber-300">
          <i class="fas fa-store"></i> Back to Store
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <h1 class="text-3xl font-black flex items-center gap-2 mb-8"><i class="fas fa-tachometer-alt text-amber-500"></i> Admin Dashboard</h1>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="bg-white dark:bg-gray-900 rounded-2xl shadow p-6 border border-gray-200 dark:border-gray-800">
        <h3 class="text-gray-500 text-sm uppercase">Total Products</h3>
        <p id="totalProductsStat" class="text-4xl font-bold mt-2">0</p>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl shadow p-6 border border-gray-200 dark:border-gray-800">
        <h3 class="text-gray-500 text-sm uppercase">Total Categories</h3>
        <p id="totalCategoriesStat" class="text-4xl font-bold mt-2">0</p>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-2xl shadow p-6 border border-gray-200 dark:border-gray-800">
        <h3 class="text-gray-500 text-sm uppercase">Mock Orders</h3>
        <p class="text-4xl font-bold mt-2">128</p>
      </div>
    </div>

    <!-- Chart -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 shadow mb-12">
      <canvas id="categoryChart" height="100"></canvas>
    </div>

    <!-- Manage Categories -->
    <div class="mb-12">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold"><i class="fas fa-tags"></i> Manage Categories</h2>
        <button id="addCategoryBtn" class="bg-amber-600 text-white px-4 py-2 rounded-full text-sm"><i class="fas fa-plus"></i> Add Category</button>
      </div>
      <div id="categoryListAdmin" class="flex flex-wrap gap-3"></div>
    </div>

    <!-- Manage Products -->
    <div>
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold"><i class="fas fa-tshirt"></i> Manage Products</h2>
        <button id="addProductBtn" class="bg-amber-600 text-white px-4 py-2 rounded-full text-sm"><i class="fas fa-plus"></i> Add Product</button>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full bg-white dark:bg-gray-900 rounded-xl border">
          <thead class="bg-gray-100 dark:bg-gray-800">
            <tr><th class="p-3 text-left">Image</th><th>Name</th><th>Category</th><th>Price</th><th>Sale</th><th>Actions</th></tr>
          </thead>
          <tbody id="productTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="py-12 border-t border-gray-200 dark:border-gray-800 text-center text-gray-500 text-sm">
    <p>© THREADFORGE — Admin Control</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
