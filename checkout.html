<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | ThreadForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-black text-gray-900 dark:text-gray-100">
  <!-- header same as before (omit for brevity) -->
  <header class="sticky top-0 z-50 bg-white/90 dark:bg-black/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <i class="fas fa-tshirt text-3xl text-amber-600 dark:text-amber-500"></i>
        <span class="text-2xl font-black tracking-tight bg-gradient-to-r from-amber-700 to-amber-500 bg-clip-text text-transparent">THREADFORGE</span>
      </a>
      <div class="flex items-center gap-5">
        <button id="themeToggle" class="text-xl p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
          <i class="fas fa-sun dark:fa-moon"></i>
        </button>
        <a href="shop.html" class="hidden md:block hover:text-amber-500 transition">Shop</a>
        <a href="cart.html" class="relative text-xl">
          <i class="fas fa-shopping-cart"></i>
          <span id="cartCount" class="absolute -top-2 -right-3 bg-amber-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </a>
        <div class="relative group">
          <button class="flex items-center gap-1"><i class="fas fa-user"></i> <span id="userName">Account</span></button>
          <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-900 rounded-md shadow-lg hidden group-hover:block z-20">
            <a href="login.html" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800">Login</a>
            <a href="#" id="logoutBtn" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-black mb-8">Checkout</h1>
    <div class="grid md:grid-cols-2 gap-8">
      <div>
        <h2 class="text-xl font-bold mb-4">Shipping Details</h2>
        <form id="checkoutForm">
          <input type="text" placeholder="Full Name" class="w-full mb-3 p-3 border rounded-lg bg-gray-50 dark:bg-gray-800" required>
          <input type="email" placeholder="Email" class="w-full mb-3 p-3 border rounded-lg bg-gray-50 dark:bg-gray-800" required>
          <input type="text" placeholder="Address" class="w-full mb-3 p-3 border rounded-lg bg-gray-50 dark:bg-gray-800" required>
          <input type="text" placeholder="City" class="w-full mb-3 p-3 border rounded-lg bg-gray-50 dark:bg-gray-800" required>
          <select class="w-full mb-3 p-3 border rounded-lg bg-gray-50 dark:bg-gray-800">
            <option>Pakistan</option>
          </select>
        </form>
        <h2 class="text-xl font-bold mt-8 mb-4">Payment Method</h2>
        <div class="space-y-3">
          <label class="flex items-center gap-3 p-3 border rounded-lg cursor-pointer">
            <input type="radio" name="payment" value="card" checked> <i class="fab fa-cc-visa text-2xl"></i> Credit / Debit Card
          </label>
          <label class="flex items-center gap-3 p-3 border rounded-lg cursor-pointer">
            <input type="radio" name="payment" value="paypal"> <i class="fab fa-paypal text-2xl"></i> PayPal
          </label>
          <label class="flex items-center gap-3 p-3 border rounded-lg cursor-pointer">
            <input type="radio" name="payment" value="cod"> <i class="fas fa-truck text-2xl"></i> Cash on Delivery
          </label>
        </div>
      </div>
      <div class="bg-gray-100 dark:bg-gray-900 p-6 rounded-xl h-fit">
        <h2 class="text-xl font-bold mb-4">Order Summary</h2>
        <div id="checkoutSummary"></div>
        <button id="placeOrderBtn" class="mt-6 w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-full transition">Place Order</button>
      </div>
    </div>
  </main>

  <footer class="py-12 border-t border-gray-200 dark:border-gray-800 text-center text-gray-500 text-sm">
    <p>© 2025 THREADFORGE — Cinematic Atelier</p>
  </footer>

  <script src="script.js"></script>
  <script>
    function renderCheckoutSummary() {
      const container = document.getElementById("checkoutSummary");
      if (cart.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        return;
      }
      let itemsHtml = cart.map(item => `<div class="flex justify-between py-1"><span>${item.name} (${item.size}) x${item.quantity}</span><span>Rs. ${(item.priceToUse * item.quantity).toLocaleString()}</span></div>`).join('');
      const total = getCartTotal();
      container.innerHTML = `
        ${itemsHtml}
        <div class="border-t my-2"></div>
        <div class="flex justify-between font-bold"><span>Total</span><span>Rs. ${total.toLocaleString()}</span></div>
      `;
    }
    renderCheckoutSummary();

    document.getElementById("placeOrderBtn").addEventListener("click", () => {
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }
      const payment = document.querySelector('input[name="payment"]:checked').value;
      alert(`Order placed successfully!\nPayment method: ${payment}\nThank you for shopping at THREADFORGE.`);
      cart = [];
      saveData();
      window.location.href = "index.html";
    });
  </script>
</body>
            </html>
